name: Public release checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install development dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q
      - name: Run Ruff
        run: python -m ruff check .
      - name: Run Bandit
        run: python -m bandit -q -r app.py engine
      - name: Audit dependencies
        run: python -m pip_audit -r requirements.txt
